name: applad_workspace
description: Applad monorepo workspace root

environment:
  sdk: ">=3.5.0 <4.0.0"

workspace:
  - packages/applad_core
  - packages/applad_cli
  - packages/applad_server
  - packages/applad_console
  - packages/applad_client

dev_dependencies:
  melos: ^7.4.0

melos:
  command:
    bootstrap:
      usePubspecOverrides: true

  scripts:
    analyze:
      run: dart analyze
      exec:
        concurrency: 4
      description: Run dart analyze in all packages
      packageFilters:
        flutter: false

    analyze:flutter:
      run: flutter analyze
      exec:
        concurrency: 2
      description: Run flutter analyze in all Flutter packages
      packageFilters:
        flutter: true

    test:
      run: dart test
      exec:
        concurrency: 4
      description: Run tests in all Dart packages
      packageFilters:
        flutter: false
        dirExists: test

    test:flutter:
      run: flutter test
      exec:
        concurrency: 2
      description: Run tests in all Flutter packages
      packageFilters:
        flutter: true
        dirExists: test

    format:
      run: dart format .
      exec:
        concurrency: 4
      description: Format all Dart files

    clean:
      run: dart pub cache clean
      description: Clean pub cache
