name: "ios-production"
platform: "ios"
target: "app-store"

source:
  type: "git"
  repo: "github.com/myorg/myapp"
  branch: "main"

build:
  command: "flutter build ipa --release"
  output: "build/ios/ipa"

  infrastructure:
    type: "cloud" # iOS builds require macOS — use cloud Mac
    provider: "aws"
    instance_type: "mac2.metal" # AWS EC2 Mac instance
    region: "us-east-1"
    credentials: "aws-production"
    teardown_after: true # Tear down immediately after build — pay only for duration

signing:
  certificate: "ios-distribution" # Reference to credential in admin database
  profile: "ios-appstore-profile"

store_metadata:
  bundle_id: "com.acme.myapp"
  release_notes: "auto"

triggers:
  - type: "git_tag"
    pattern: "v*"
  - type: "manual"
