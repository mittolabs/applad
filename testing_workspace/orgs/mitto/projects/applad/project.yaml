# ============================================================
# PROJECT DEFINITION
# Defines environments and infrastructure targets.
# Per-environment targets mean local, VPS, and cloud can
# all coexist for the same project at different stages.
# ============================================================

id: "applad"
name: "applad"
org: "mitto"
description: "Primary application"

features: # Override instance-level feature toggles
  graphql: true
  realtime: true
  messaging: true
  flags: true
  analytics: true
  deployments: true
  instruct: true

environments:
  - name: "development"
    url: "http://168.231.124.81"
    infrastructure:
      type: "vps"
      host: "168.231.124.81"
      user: "root"

