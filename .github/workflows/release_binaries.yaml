name: Build and Release Binaries

on:
  release:
    types: [published]

jobs:
  build_binaries:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            target: x86_64-unknown-linux-gnu
            binary_name: applad
          - os: macos-15-intel
            platform: macos
            target: x86_64-apple-darwin
            binary_name: applad
          - os: macos-latest
            platform: macos
            target: aarch64-apple-darwin
            binary_name: applad
          - os: windows-latest
            platform: windows
            target: x86_64-pc-windows-msvc
            binary_name: applad.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Install dependencies
        run: flutter pub get
        working-directory: packages/applad_cli

      - name: Compile executable
        run: dart compile exe bin/applad.dart -o ../../${{ matrix.binary_name }}
        working-directory: packages/applad_cli

      - name: Archive binary
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a applad-${{ matrix.target }}.zip ${{ matrix.binary_name }}
          else
            zip applad-${{ matrix.target }}.zip ${{ matrix.binary_name }}
          fi

          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum applad-${{ matrix.target }}.zip > applad-${{ matrix.target }}.zip.sha256sum
          else
            shasum -a 256 applad-${{ matrix.target }}.zip > applad-${{ matrix.target }}.zip.sha256sum
          fi

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            applad-${{ matrix.target }}.zip
            applad-${{ matrix.target }}.zip.sha256sum
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
