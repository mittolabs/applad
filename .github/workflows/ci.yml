# Applad CI — runs on every push and pull request to main
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DART_VERSION: "3.5.0"
  FLUTTER_VERSION: "3.24.0"

jobs:
  # ─── Analyze Dart packages ────────────────────────────────────────────────
  analyze-dart:
    name: Analyze Dart Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ env.DART_VERSION }}

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Analyze (Dart packages)
        run: melos run analyze

  # ─── Test Dart packages ───────────────────────────────────────────────────
  test-dart:
    name: Test Dart Packages
    runs-on: ubuntu-latest
    needs: analyze-dart
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ env.DART_VERSION }}

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Run tests
        run: melos run test

  # ─── Analyze Flutter packages ─────────────────────────────────────────────
  analyze-flutter:
    name: Analyze Flutter Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Analyze Flutter packages
        run: melos run analyze:flutter

  # ─── Test Flutter packages ────────────────────────────────────────────────
  test-flutter:
    name: Test Flutter Packages
    runs-on: ubuntu-latest
    needs: analyze-flutter
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Run Flutter tests
        run: melos run test:flutter

  # ─── Build Docker image ───────────────────────────────────────────────────
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test-dart, test-flutter]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: mittolabs/applad:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
