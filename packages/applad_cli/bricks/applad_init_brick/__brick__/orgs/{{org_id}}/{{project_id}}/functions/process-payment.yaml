name: "process-payment"
runtime: "node"
entrypoint: "process-payment.js"
timeout: 60
memory: "512mb"

container:
  readonly_filesystem: true
  no_new_privileges: true
  network: "restricted"
  allowed_hosts:
    - "api.stripe.com"

triggers:
  - type: "http"
    method: "POST"
    path: "/payments/process"
    auth_required: true
    rate_limit:
      requests: 10
      window: "1m"
      per: "user" # Rate limit per user identity

environment:
  - key: "STRIPE_SECRET"
    value: ${STRIPE_SECRET}
