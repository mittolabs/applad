# ============================================================
# AUTH CONFIGURATION
# Provider config, session settings, security rules.
# User records and sessions live in the runtime database.
# Runtime auth preferences in the admin-managed database.
# ============================================================

session:
  duration: 86400 # 24 hours
  refresh: true
  refresh_duration: 2592000 # 30 days
  rotate_on_refresh: true # Issue new token on every refresh

password:
  min_length: 10
  require_uppercase: true
  require_number: true
  require_symbol: true
  hashing: "argon2id"
  argon2id:
    memory: 65536
    iterations: 3
    parallelism: 4

brute_force:
  enabled: true
  max_attempts: 5
  lockout_duration: 900 # 15 minutes
  progressive: true # Increasing lockout on repeated failures

mfa:
  enabled: true
  required: false # Org-level requirement set in org.yaml
  methods:
    - type: "totp"
      enabled: true
#    - type: "webauthn"
#      enabled: true
#      relying_party: "myapp.com"
#    - type: "backup_codes"
#      enabled: true
#      count: 10

providers:
  - type: "email"
    enabled: true
    verification_required: true
    verification_expiry: 86400 # 24 hours

  - type: "phone"
    enabled: false

#  - type: "oauth"
#    name: "google"
#    enabled: true
#    client_id: ${GOOGLE_CLIENT_ID}
#    client_secret: ${GOOGLE_CLIENT_SECRET}
#    scopes: ["email", "profile"]
#    pkce: true                       # Always use PKCE for OAuth flows

#  - type: "oauth"
#    name: "github"
#    enabled: true
#    client_id: ${GITHUB_CLIENT_ID}
#    client_secret: ${GITHUB_CLIENT_SECRET}
#    scopes: ["user:email"]
#    pkce: true

multi_tenancy:
  model: "row" # row | schema | database
  tenant_field: "org_id"

tokens:
  access_token_expiry: 900 # 15 minutes
  refresh_token_expiry: 2592000 # 30 days
  rotation: true
  revocation_on_password_change: true
  revocation_on_suspicious_activity: true
