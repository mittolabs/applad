# ============================================================
# FUNCTION DEFINITION
# This example demonstrates fetching function source from
# a remote Git repository at deploy time.
# ============================================================

name: "send-welcome-message"
runtime: "dart"
timeout: 30
memory: "256mb"

source:
  type: "github"
  repo: "mittolabs/applad-examples"
  branch: "main"
  path: "functions/send-welcome-message/handler.dart"
  ssh_key: "ci-github-actions" # References key in org.yaml

entrypoint: "handler"

# Container security — each function runs isolated
container:
  readonly_filesystem: true
  no_new_privileges: true
  network: "restricted" # No outbound except explicitly allowed
  allowed_hosts:
    - "api.resend.com"

triggers:
  - type: "event"
    event: "auth.user.created"

environment:
  - key: "MESSAGING_PROVIDER"
    value: ${MESSAGING_PROVIDER}
