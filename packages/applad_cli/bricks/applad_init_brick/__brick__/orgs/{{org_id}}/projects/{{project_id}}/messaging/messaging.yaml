# ============================================================
# MESSAGING CONFIGURATION
# Provider config per channel. All channels under one roof.
# Template content lives in the admin-managed database so
# non-developers can edit copy without a git commit.
# Template references defined in messaging/templates/*.yaml.
# All messaging events logged to the runtime database.
# ============================================================

# Email channel
email:
  enabled: true
  provider: "resend" # resend | smtp | sendgrid | postmark | ses
  config:
    api_key: ${RESEND_API_KEY}
    from: "hello@myapp.com"
    from_name: "My App"
    reply_to: "support@myapp.com"
  environment_overrides:
    production:
      provider: "ses" # Switch to SES at scale — one line change
      config:
        access_key: ${AWS_SES_ACCESS_KEY}
        secret_key: ${AWS_SES_SECRET_KEY}
        region: "eu-west-1"
        from: "hello@myapp.com"

# SMS channel
sms:
  enabled: true
  provider: "twilio" # twilio | vonage | africas_talking | custom
  config:
    account_sid: ${TWILIO_ACCOUNT_SID}
    auth_token: ${TWILIO_AUTH_TOKEN}
    from: ${TWILIO_FROM_NUMBER}

# Mobile push notifications
push:
  enabled: true
  providers:
    - platform: "android"
      provider: "fcm"
      config:
        service_account: ${FCM_SERVICE_ACCOUNT}

    - platform: "ios"
      provider: "apns"
      config:
        key_id: ${APNS_KEY_ID}
        team_id: ${APNS_TEAM_ID}
        private_key: ${APNS_PRIVATE_KEY}
        environment: "production" # production | sandbox

# In-app notifications
in_app:
  enabled: true
  persistence: true # Store in runtime database
  max_age: "30d" # Auto-purge after 30 days
  realtime_delivery: true # Deliver via realtime channel

# Chat and team integrations
integrations:
  - name: "slack"
    enabled: true
    webhook_url: ${SLACK_WEBHOOK_URL}
    default_channel: "#alerts"

  - name: "discord"
    enabled: false
    webhook_url: ${DISCORD_WEBHOOK_URL}

  - name: "teams"
    enabled: false
    webhook_url: ${TEAMS_WEBHOOK_URL}
