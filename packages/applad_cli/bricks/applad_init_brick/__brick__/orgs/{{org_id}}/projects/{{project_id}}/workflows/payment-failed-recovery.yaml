name: "payment-failed-recovery"
trigger:
  type: "event"
  event: "payment.failed"

steps:
  - name: "notify-user-push"
    type: "message"
    channel: "push"
    template: "payment-failed-push"

  - name: "notify-user-sms"
    type: "message"
    channel: "sms"
    template: "payment-failed-sms"
    depends_on: ["notify-user-push"]

  - name: "wait"
    type: "delay"
    duration: "24h"

  - name: "retry-payment"
    type: "function"
    function: "process-payment"

  - name: "notify-user-email"
    type: "message"
    channel: "email"
    template: "payment-failed"
    condition: "steps.retry-payment.status == 'failed'"

  - name: "notify-team-slack"
    type: "message"
    channel: "slack"
    template: "payment-retry-failed-alert"
    condition: "steps.retry-payment.status == 'failed'"
