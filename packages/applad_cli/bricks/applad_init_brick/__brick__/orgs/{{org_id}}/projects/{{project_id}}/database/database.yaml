# ============================================================
# DATABASE ADAPTER CONFIGURATION
# Which adapter, which connection, which pool settings.
# Schema in migrations/. Data in the database. Never mixed.
# Connection pooling configured from day one — not bolted on.
# ============================================================

default: "primary"

connections:
  - id: "primary"
    adapter: "{{db_adapter}}"              # postgres | mysql | mariadb | sqlite | mongodb | libsql
{{#is_sqlite}}    path: "./data.db"{{/is_sqlite}}{{^is_sqlite}}    url: ${DATABASE_URL}  # Always env-injected{{/is_sqlite}}
    pool:
      min: 2
      max: 20
      idle_timeout: 300
      queue_timeout: 10
    migrations:
      auto: false                    # Never auto-migrate in production
      dir: "./migrations"
{{^is_sqlite}}    ssl:
      required: true
      verify_cert: true{{/is_sqlite}}

#  Uncomment to setup additional connections like Redis cache
#  - id: "cache"
#    adapter: "redis"
#    url: ${REDIS_URL}
#    ssl:
#      required: true

  # Separate analytics database — keeps analytical queries
  # from competing with application queries
  - id: "analytics"
    adapter: "sqlite"
    path: "./data/analytics.db"      # Local in dev, cloud-backed in production via adapter

routing:
  app_data: "primary"
#  cache: "cache"
  analytics: "analytics"

# Per-environment adapter overrides.
# Local uses SQLite. Staging uses Postgres on VPS.
# Production uses Postgres on VPS with RDS as failover.
# Application code never changes — only this config does.
environment_overrides:
  development:
    primary:
      adapter: "sqlite"
      path: "./data/dev.db"

