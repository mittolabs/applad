# ============================================================
# ANALYTICS CONFIGURATION
# What to collect and where. Raw events in runtime database.
# Custom dashboard layouts in admin-managed database.
# No data sent anywhere by default.
# ============================================================

enabled: true
db: "analytics"

retention:
  raw_events: "90d"
  aggregated: "2y"

capture:
  api_requests: true
  function_executions: true
  auth_events: true
  storage_operations: true
  messaging_events: true
  custom_events: true
  security_events: true
  cloud_resource_lifecycle: true # Spin-up, usage, tear-down, cost per operation

export:
  - type: "bigquery"
    enabled: false
    dataset: ${BQ_DATASET}
    credentials: ${BQ_CREDENTIALS}

  - type: "amplitude"
    enabled: false
    api_key: ${AMPLITUDE_API_KEY}
