name: "daily-report"
runtime: "python"
entrypoint: "daily.py"
timeout: 300
memory: "1gb"

# This function can burst to cloud compute when needed.
# Applad SSHs into the cloud VM, runs the container, tears it down.
# Billed only for the duration of the job.
cloud_burst:
  enabled: true
  provider: "aws"
  instance_type: "t3.large"
  region: "eu-west-1"
  credentials: "aws-production" # Reference to credential in admin database
  max_duration: 3600 # Auto-terminate after 1 hour

container:
  readonly_filesystem: false # Needs to write report output
  no_new_privileges: true
  network: "restricted"
  allowed_hosts:
    - "s3.eu-west-1.amazonaws.com"

triggers:
  - type: "schedule"
    cron: "0 9 * * *" # Every day at 9am
